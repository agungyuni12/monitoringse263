<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SIGEMPAR SE2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            se: { DEFAULT:'#F37021', dark:'#d45f10', light:'#f59548', bg:'#FFF4ED' }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-se-bg flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <img src="/static/logo-sigempar.png" alt="SIGEMPAR" class="w-24 h-24 mx-auto mb-3 rounded-2xl shadow-md object-contain"/>
      <h1 class="text-2xl font-bold text-se">SIGEMPAR</h1>
      <p class="text-sm text-gray-600 mt-1 font-medium">Sistem Geospasial Monitoring Pencacahan</p>
      <p class="text-xs text-gray-400 mt-0.5">Survei-Survei Rumah Tangga – SE 2026</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">Masuk ke SIGEMPAR</h2>

      {{if .Error}}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/login">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Email / ID Sobat</label>
          <input id="username" name="username" type="text" required autocomplete="username"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-se focus:border-transparent text-gray-800 text-sm"
            placeholder="Masukkan email atau ID Sobat"/>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-se focus:border-transparent text-gray-800 text-sm"
            placeholder="Masukkan password"/>
        </div>
        <button type="submit"
          class="w-full py-2.5 px-4 bg-se hover:bg-se-dark text-white font-semibold rounded-lg transition-colors text-sm">
          Masuk
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">© 2026 BPS – SIGEMPAR SE 2026</p>
  </div>
</body>
</html>
