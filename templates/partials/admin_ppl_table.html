{{define "admin_ppl_table.html"}}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="bg-orange-50 text-gray-600 text-left text-xs uppercase tracking-wide">
        <th class="px-4 py-3 font-medium">Nama PPL</th>
        <th class="px-4 py-3 font-medium">Supervisor (PML)</th>
        <th class="px-4 py-3 font-medium text-center">Jml SLS</th>
        <th class="px-4 py-3 font-medium text-center">Target</th>
        <th class="px-4 py-3 font-medium text-center">Submit</th>
        <th class="px-4 py-3 font-medium text-center">Draft</th>
        <th class="px-4 py-3 font-medium text-center">% Submit</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {{range .PPLs}}
      <tr class="hover:bg-orange-50/30 transition-colors">
        <td class="px-4 py-3 font-medium text-gray-800">{{.Name}}</td>
        <td class="px-4 py-3 text-gray-600 text-xs">{{.PMLName}}</td>
        <td class="px-4 py-3 text-center text-gray-700">{{.JmlSLS}}</td>
        <td class="px-4 py-3 text-center text-gray-700">{{.Target}}</td>
        <td class="px-4 py-3 text-center">
          <span class="{{if gt .Submit 0}}text-green-600 font-semibold{{else}}text-gray-400{{end}}">{{.Submit}}</span>
        </td>
        <td class="px-4 py-3 text-center">
          <span class="{{if gt .Draft 0}}text-se font-semibold{{else}}text-gray-400{{end}}">{{.Draft}}</span>
        </td>
        <td class="px-4 py-3">
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden min-w-16">
              <div class="h-full bg-green-500 rounded-full" style="width:{{pct .Submit .Target}}%"></div>
            </div>
            <span class="text-xs text-gray-500 w-8 text-right">{{pct .Submit .Target}}%</span>
          </div>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">Belum ada data PPL.</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{template "pagination" .PPLPage}}
{{end}}
