{{define "ppl_anomali.html"}}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="bg-orange-50 text-gray-600 text-left text-xs uppercase tracking-wide">
        <th class="px-4 py-3 font-medium text-center">No</th>
        <th class="px-4 py-3 font-medium">Nama SLS</th>
        <th class="px-4 py-3 font-medium">Nama</th>
        <th class="px-4 py-3 font-medium">Jenis Anomali</th>
        <th class="px-4 py-3 font-medium">Keterangan</th>
        <th class="px-4 py-3 font-medium text-center">Sync</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {{range $i, $r := .Rows}}
      <tr class="hover:bg-orange-50/30 transition-colors">
        <td class="px-4 py-3 text-center text-gray-400 text-xs">{{add $.PageInfo.From $i}}</td>
        <td class="px-4 py-3 font-medium text-gray-800 whitespace-nowrap">{{$r.NamaSLS}}</td>
        <td class="px-4 py-3 text-gray-800">{{$r.Nama}}</td>
        <td class="px-4 py-3">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700 whitespace-nowrap">
            {{$r.Jenis}}
          </span>
        </td>
        <td class="px-4 py-3 text-gray-600 max-w-xs">
          <span class="text-xs">{{$r.RuleMsg}}</span>
        </td>
        <td class="px-4 py-3 text-center text-gray-400 text-xs whitespace-nowrap">{{$r.SyncedAt}}</td>
      </tr>
      {{else}}
      <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Belum ada data anomali.</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{template "pagination" .PageInfo}}
{{end}}
