{{define "ppl_row.html"}}
<tr id="row-sls-{{.SLS.ID}}" class="hover:bg-orange-50/30 dark:hover:bg-gray-800/60 transition-colors
  {{if and (gt .JumlahSubmit 0) (eq .JumlahSubmit .Target)}}bg-green-50 dark:bg-green-900/10{{end}}">
  <td class="px-4 py-3">
    <p class="font-medium text-gray-800 dark:text-gray-100 text-xs">{{.NamaSLS}}</p>
    <p class="text-xs text-gray-400 dark:text-gray-500 font-mono">{{.KodeSLS}}</p>
  </td>
  <td class="px-4 py-3 text-xs text-gray-600 dark:text-gray-400">
    <p>{{.NamaDesa}}</p>
    <p class="text-gray-400 dark:text-gray-500">Kec. {{.NamaKec}}</p>
  </td>
  <td class="px-4 py-3 text-center text-gray-700 dark:text-gray-300 text-sm">{{.Target}}</td>
  <td class="px-4 py-3 text-center">
    <span class="{{if gt .JumlahSubmit 0}}text-green-600 dark:text-green-400 font-semibold{{else}}text-gray-400 dark:text-gray-500{{end}} text-sm">{{.JumlahSubmit}}</span>
  </td>
  <td class="px-4 py-3 text-center">
    <span class="{{if gt .JumlahDraft 0}}text-se font-semibold{{else}}text-gray-400 dark:text-gray-500{{end}} text-sm">{{.JumlahDraft}}</span>
  </td>
  <td class="px-4 py-3 text-center">
    {{if gt .JmlLaporan 0}}
    <span class="text-xs text-green-500 dark:text-green-400">&#10003; {{.TanggalTerakhir}}</span>
    {{else}}
    <span class="text-gray-300 dark:text-gray-600 text-xs">–</span>
    {{end}}
  </td>
  <td class="px-4 py-3 text-center">
    <button
      hx-get="/ppl/sls/{{.SLS.ID}}/form"
      hx-target="#modal-content"
      hx-swap="innerHTML"
      hx-on::after-request="openModal()"
      class="text-xs bg-se hover:bg-se-dark text-white px-4 py-1.5 rounded-lg font-medium transition-colors">
      Detail
    </button>
  </td>
</tr>
{{end}}
